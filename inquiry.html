<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도입 문의 — 한컴 Agentic OS</title>
<style>
:root {
  --ground:      #0B0F1A;
  --surface:     #141B2D;
  --surface-2:   #1E2A45;
  --text:        #EEF0F5;
  --text-muted:  #8892A4;
  --accent:      #FF6B00;
  --accent-warm: #FF9040;
  --accent-glow: rgba(255,107,0,0.15);
  --border-dark: rgba(255,255,255,0.08);
  --font: 'Pretendard Variable','Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;
  --radius: 12px;
  --ease: 0.25s cubic-bezier(0.4,0,0.2,1);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body { font-family:var(--font); background:var(--ground); color:var(--text); min-height:100vh; line-height:1.65; }

/* NAV */
nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  height:64px; padding:0 48px;
  display:flex; align-items:center; justify-content:space-between;
  background:rgba(11,15,26,0.92); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border-dark);
}
.nav-logo { font-size:18px; font-weight:800; color:var(--text); text-decoration:none; letter-spacing:-0.02em; }
.nav-logo em { color:var(--accent); font-style:normal; }
.nav-back { color:var(--text-muted); text-decoration:none; font-size:14px; font-weight:500; display:flex; align-items:center; gap:6px; transition:color var(--ease); }
.nav-back:hover { color:var(--text); }
.nav-back svg { width:16px; height:16px; }

/* MAIN */
main { padding:120px 24px 80px; max-width:680px; margin:0 auto; }

.page-eyebrow {
  font-size:11px; font-weight:800; letter-spacing:0.15em; text-transform:uppercase;
  color:var(--accent); margin-bottom:12px;
}
.page-title {
  font-size:clamp(28px,4vw,42px); font-weight:800; letter-spacing:-0.03em;
  line-height:1.2; margin-bottom:10px;
}
.page-desc { font-size:15px; color:var(--text-muted); line-height:1.7; margin-bottom:48px; }

/* FORM */
form { display:flex; flex-direction:column; gap:20px; }

.form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media (max-width:540px) { .form-row { grid-template-columns:1fr; } nav { padding:0 20px; } }

.field { display:flex; flex-direction:column; gap:7px; }
.field label {
  font-size:13px; font-weight:600; color:var(--text-muted);
  letter-spacing:0.02em;
}
.field label span { color:var(--accent); margin-left:2px; }
.field input,
.field select,
.field textarea {
  background:var(--surface); border:1px solid var(--border-dark);
  border-radius:8px; color:var(--text); font-family:var(--font);
  font-size:15px; padding:12px 14px;
  transition:border-color var(--ease), box-shadow var(--ease);
  outline:none; width:100%;
}
.field input::placeholder,
.field textarea::placeholder { color:var(--text-muted); }
.field input:focus,
.field select:focus,
.field textarea:focus {
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(255,107,0,0.12);
}
.field select { appearance:none; cursor:pointer; }
.field textarea { min-height:120px; resize:vertical; }

/* CHECKBOX GROUP */
.check-group { display:flex; flex-direction:column; gap:7px; }
.check-group label {
  font-size:13px; font-weight:600; color:var(--text-muted); letter-spacing:0.02em;
}
.check-options { display:flex; flex-wrap:wrap; gap:10px; margin-top:2px; }
.check-option {
  display:flex; align-items:center; gap:8px;
  background:var(--surface); border:1px solid var(--border-dark);
  border-radius:8px; padding:10px 14px; cursor:pointer;
  transition:border-color var(--ease), background var(--ease);
  font-size:14px; color:var(--text-muted);
  user-select:none;
}
.check-option:has(input:checked) {
  border-color:var(--accent); background:var(--accent-glow); color:var(--text);
}
.check-option input { display:none; }

/* DIVIDER */
.divider { height:1px; background:var(--border-dark); margin:4px 0; }

/* SUBMIT */
.btn-submit {
  background:var(--accent); color:#fff; border:none; cursor:pointer;
  padding:16px 36px; border-radius:8px; font-size:16px; font-weight:700;
  font-family:var(--font); width:100%;
  transition:background var(--ease), transform var(--ease), box-shadow var(--ease);
}
.btn-submit:hover { background:var(--accent-warm); transform:translateY(-2px); box-shadow:0 10px 28px rgba(255,107,0,0.35); }
.btn-submit:disabled { opacity:0.6; cursor:not-allowed; transform:none; box-shadow:none; }

/* THANK YOU */
#thank-you {
  display:none; text-align:center; padding:80px 24px;
}
#thank-you .ty-icon { font-size:56px; margin-bottom:24px; }
#thank-you h2 { font-size:28px; font-weight:800; letter-spacing:-0.02em; margin-bottom:12px; }
#thank-you p { font-size:16px; color:var(--text-muted); line-height:1.7; margin-bottom:36px; }
#thank-you a {
  display:inline-block; background:var(--accent); color:#fff; text-decoration:none;
  padding:13px 30px; border-radius:8px; font-size:15px; font-weight:700;
}

/* ERROR MSG */
.error-msg { font-size:12px; color:#F87171; margin-top:4px; display:none; }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">한컴 <em>Agentic OS</em></a>
  <a class="nav-back" href="index.html">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M10 3L5 8l5 5"/>
    </svg>
    메인으로 돌아가기
  </a>
</nav>

<main>
  <div id="form-section">
    <p class="page-eyebrow">도입 문의</p>
    <h1 class="page-title">한컴 Agentic OS<br>도입을 검토하고 계신가요?</h1>
    <p class="page-desc">아래 양식을 작성해 주시면 담당 컨설턴트가 1~2 영업일 내 연락드립니다.<br><span style="color:var(--accent)">*</span> 표시 항목은 필수입니다.</p>

    <!-- TODO: action 값을 Formspree에서 발급받은 URL로 교체하세요 -->
    <!-- 예: https://formspree.io/f/xabc1234 -->
    <form id="inquiry-form" action="https://formspree.io/f/xpqgqqdr" method="POST">
      <!-- Formspree 제출 후 이 페이지에 머물도록 -->
      <input type="hidden" name="_next" value="">
      <input type="hidden" name="_subject" value="[한컴 Agentic OS] 도입 문의가 접수되었습니다">
      <input type="text" name="_gotcha" style="display:none">

      <div class="form-row">
        <div class="field">
          <label>회사명 <span>*</span></label>
          <input type="text" name="company" placeholder="(주)한글과컴퓨터" required>
        </div>
        <div class="field">
          <label>담당자 성함 <span>*</span></label>
          <input type="text" name="name" placeholder="홍길동" required>
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>직책 / 부서</label>
          <input type="text" name="position" placeholder="AI 혁신팀 팀장">
        </div>
        <div class="field">
          <label>연락처 <span>*</span></label>
          <input type="tel" name="phone" placeholder="010-0000-0000" required>
        </div>
      </div>

      <div class="field">
        <label>이메일 <span>*</span></label>
        <input type="email" name="email" placeholder="example@company.com" required>
      </div>

      <div class="divider"></div>

      <div class="field">
        <label>직원 규모</label>
        <select name="company_size">
          <option value="" disabled selected>선택해 주세요</option>
          <option value="50명 미만">50명 미만</option>
          <option value="50~200명">50~200명</option>
          <option value="200~1,000명">200~1,000명</option>
          <option value="1,000명 이상">1,000명 이상</option>
        </select>
      </div>

      <div class="check-group">
        <label>관심 배포 방식 (복수 선택 가능)</label>
        <div class="check-options">
          <label class="check-option">
            <input type="checkbox" name="deploy_type" value="On-Prem">
            🏢 On-Prem (폐쇄망)
          </label>
          <label class="check-option">
            <input type="checkbox" name="deploy_type" value="SaaS">
            ☁️ SaaS (클라우드)
          </label>
          <label class="check-option">
            <input type="checkbox" name="deploy_type" value="하이브리드">
            🔀 하이브리드
          </label>
        </div>
      </div>

      <div class="field">
        <label>도입 희망 업무 / 산업</label>
        <input type="text" name="industry" placeholder="예: 금융 여신심사 자동화, 제조 공장 운영 최적화">
      </div>

      <div class="field">
        <label>추가 문의사항</label>
        <textarea name="message" placeholder="현재 환경, 예산 규모, 도입 일정 등 자유롭게 작성해 주세요."></textarea>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">문의 제출하기</button>
    </form>
  </div>

  <div id="thank-you">
    <div class="ty-icon">✅</div>
    <h2>문의가 접수되었습니다</h2>
    <p>담당 컨설턴트가 <strong style="color:var(--text)">1~2 영업일 내</strong> 연락드리겠습니다.<br>추가 문의는 <a href="mailto:yarong09@hancom.com" style="color:var(--accent);text-decoration:none;">yarong09@hancom.com</a>으로 보내주세요.</p>
    <a href="index.html">메인 페이지로 돌아가기</a>
  </div>
</main>

<script>
const form = document.getElementById('inquiry-form');
const thankYou = document.getElementById('thank-you');
const formSection = document.getElementById('form-section');
const submitBtn = document.getElementById('submit-btn');

form.addEventListener('submit', async function(e) {
  e.preventDefault();

  const action = form.getAttribute('action');
  if (!action || action === 'FORMSPREE_URL') {
    alert('Formspree URL을 설정해 주세요. inquiry.html의 form action 값을 업데이트하세요.');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = '제출 중...';

  try {
    const data = new FormData(form);
    const res = await fetch(action, {
      method: 'POST',
      body: data,
      headers: { 'Accept': 'application/json' }
    });

    if (res.ok) {
      formSection.style.display = 'none';
      thankYou.style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      throw new Error('submit failed');
    }
  } catch {
    alert('제출 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
    submitBtn.disabled = false;
    submitBtn.textContent = '문의 제출하기';
  }
});
</script>
</body>
</html>
